<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white p-6 mt-10 shadow-md rounded">
        <h1 class="text-2xl font-bold text-center mb-6">Current Results</h1>
        <div>
            <ul class="space-y-2">
                {% for player, count in votes.items() %}
                <li class="flex justify-between"><span class="font-semibold">{{ player }}</span><span>{{ count }} votes</span></li>
                {% endfor %}
            </ul>
        </div>
        <a href="{{ url_for('index') }}" class="block mt-6 text-center text-blue-500 hover:underline">Back to Vote</a>
    </div>
</body>
</html>
