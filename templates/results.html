<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Results</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>
    <div class="container">
        <h1>Current Results</h1>
        <div class="results">
            <ul>
                {% for player, count in votes.items() %}
                <li><strong>{{ player }}:</strong> {{ count }} votes</li>
                {% endfor %}
            </ul>
        </div>
        <a href="{{ url_for('index') }}">Back to Vote</a>
    </div>
</body>
</html>
