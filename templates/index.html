<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vote for Best Player</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
    <div class="max-w-md mx-auto bg-white p-6 mt-10 shadow-md rounded">
        <h1 class="text-2xl font-bold text-center mb-6">Vote for Best Football Player of the Year</h1>
        <form action="/vote" method="post" class="flex flex-col space-y-4">
            {% for player in players %}
            <label class="flex items-center space-x-2">
                <input type="radio" name="player" value="{{ player }}" required class="text-blue-600">
                <span>{{ player }}</span>
            </label>
            {% endfor %}
            <button type="submit" class="bg-blue-500 text-white py-2 rounded hover:bg-blue-600">Vote</button>
        </form>
    </div>
</body>
</html>
